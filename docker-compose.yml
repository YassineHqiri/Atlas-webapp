    volumes:
      - /etc/letsencrypt/live/atlascyber.viewdns.net/fullchain.pem:/etc/nginx/ssl/cert.pem:ro
      - /etc/letsencrypt/live/atlascyber.viewdns.net/privkey.pem:/etc/nginx/ssl/key.pem:ro
